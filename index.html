<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temps de passage Marathon — RPT Hybrid</title>

<style>
  :root {
    --navy: #0f1f38;
    --navy2: #1a3355;
    --blue: #2563a8;
    --blue-light: #3b82d4;
    --accent: #e84c1e;
    --accent2: #ff6b3d;
    --gold: #f5a623;
    --white: #ffffff;
    --off-white: #f4f6fa;
    --muted: #8a9ab5;
    --text: #1a2740;
    --border: rgba(37,99,168,0.15);
    --card-bg: #ffffff;
    --row-alt: #f0f5fc;
    --finish-bg: #0f1f38;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: var(--off-white);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--navy);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
  }

  .logo {
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--white);
    padding: 16px 0;
    flex-shrink: 0;
  }

  .logo span { color: var(--accent); }

  .header-title {
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--muted);
    flex: 1;
    text-align: center;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    flex-shrink: 0;
  }

  .tab-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 20px 20px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }

  .tab-btn:hover { color: var(--white); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN */
  main { max-width: 1400px; margin: 0 auto; padding: 2rem; }

  .view { display: none; }
  .view.active { display: block; }

  /* ===== CALCULATEUR ===== */
  .calc-hero {
    background: var(--navy);
    border-radius: 16px;
    padding: 2.5rem 3rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 3rem;
    flex-wrap: wrap;
  }

  .calc-label-group { flex: 1; min-width: 200px; }

  .calc-label {
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .calc-title {
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--white);
    line-height: 1;
  }

  .calc-title span { color: var(--accent); }

  .input-group {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .time-inputs {
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid var(--blue-light);
    border-radius: 12px;
    padding: 12px 16px;
  }

  .time-sep {
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 28px;
    color: var(--blue-light);
    padding: 0 2px;
    line-height: 1;
  }

  .time-unit-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
    display: block;
    margin-top: 2px;
  }

  .time-col { display: flex; flex-direction: column; align-items: center; }

  .time-spin {
    background: transparent;
    border: none;
    color: var(--white);
    font-family: 'Courier New', Courier, monospace;
    font-size: 32px;
    font-weight: 500;
    width: 56px;
    text-align: center;
    outline: none;
    -moz-appearance: textfield;
    appearance: textfield;
  }

  .time-spin::-webkit-outer-spin-button,
  .time-spin::-webkit-inner-spin-button { -webkit-appearance: none; }

  .pace-display {
    background: rgba(229, 76, 30, 0.12);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 12px 20px;
    text-align: center;
  }

  .pace-value {
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 28px;
    color: var(--accent2);
    letter-spacing: 2px;
    line-height: 1;
  }

  .pace-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* TABLE CALCULATEUR */
  .pass-table {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 24px rgba(15,31,56,0.08);
  }

  .pass-table table {
    width: 100%;
    border-collapse: collapse;
  }

  .pass-table thead th {
    background: var(--navy);
    color: var(--muted);
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 14px 20px;
    text-align: left;
  }

  .pass-table thead th:nth-child(2),
  .pass-table thead th:nth-child(3),
  .pass-table thead th:nth-child(4) { text-align: center; }

  .pass-table tbody tr { transition: background 0.15s; }
  .pass-table tbody tr:nth-child(even) { background: var(--row-alt); }
  .pass-table tbody tr:hover { background: #dce8f8; }

  .pass-table tbody tr.finish-row {
    background: var(--finish-bg) !important;
  }

  .pass-table tbody tr.finish-row td {
    color: var(--white) !important;
  }

  .pass-table tbody td {
    padding: 13px 20px;
    font-size: 15px;
    color: var(--text);
    border-bottom: 1px solid var(--border);
  }

  .km-badge {
    display: inline-block;
    background: var(--navy);
    color: var(--white);
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 14px;
    letter-spacing: 1.5px;
    padding: 4px 12px;
    border-radius: 6px;
  }

  .finish-row .km-badge {
    background: var(--accent);
  }

  .time-cell {
    font-family: 'Courier New', Courier, monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--navy2);
    text-align: center;
  }

  .finish-row .time-cell { color: var(--white); font-size: 18px; }

  .pace-cell {
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    color: var(--muted);
    text-align: center;
  }

  .finish-row .pace-cell { color: var(--gold); }

  .split-cell {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    font-family: 'Courier New', Courier, monospace;
  }

  .finish-row .split-cell { color: rgba(255,255,255,0.6); }

  .bar-col { width: 140px; }

  .progress-bar-bg {
    background: rgba(37,99,168,0.12);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    background: linear-gradient(90deg, var(--blue), var(--accent));
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .finish-row .progress-bar-bg { background: rgba(255,255,255,0.1); }
  .finish-row .progress-bar-fill { background: linear-gradient(90deg, var(--gold), var(--accent2)); }

  /* ===== GRILLE RÉFÉRENCE ===== */
  .ref-controls {
    background: var(--navy);
    border-radius: 16px;
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .ref-controls-label {
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .range-group {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    flex-wrap: wrap;
  }

  .range-group select {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--blue-light);
    color: var(--white);
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    padding: 8px 12px;
    border-radius: 8px;
    outline: none;
  }

  .range-sep {
    color: var(--muted);
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
  }

  .ref-hint {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  /* GRILLE TABLE */
  .grid-wrapper {
    overflow-x: auto;
    border-radius: 16px;
    box-shadow: 0 2px 24px rgba(15,31,56,0.08);
  }

  .grid-table {
    border-collapse: collapse;
    background: var(--card-bg);
    min-width: 100%;
    white-space: nowrap;
  }

  .grid-table th {
    background: var(--navy);
    padding: 0;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .grid-table th.km-head {
    width: 90px;
    min-width: 90px;
    padding: 10px 14px;
    color: var(--muted);
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-align: center;
    vertical-align: bottom;
  }

  .grid-table th .obj-time {
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    display: block;
    padding: 8px 10px 4px;
    text-align: center;
  }

  .grid-table th .obj-pace {
    font-family: 'Courier New', Courier, monospace;
    font-size: 10px;
    color: var(--blue-light);
    display: block;
    padding: 0 10px 8px;
    text-align: center;
  }

  .grid-table td {
    padding: 9px 12px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    text-align: center;
    border: 1px solid var(--border);
    color: var(--navy2);
  }

  .grid-table tr:nth-child(even) td { background: var(--row-alt); }
  .grid-table tr:hover td { background: #dce8f8; }

  .grid-table td.km-cell {
    background: var(--navy2) !important;
    color: var(--white) !important;
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    text-align: center;
    width: 90px;
    min-width: 90px;
  }

  .grid-table tr.finish-row td { background: var(--navy) !important; color: var(--gold) !important; font-weight: 500; }
  .grid-table tr.finish-row td.km-cell { background: var(--accent) !important; color: var(--white) !important; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
  }

  footer strong { color: var(--accent); font-family: 'Impact', 'Arial Narrow', sans-serif; font-size: 15px; letter-spacing: 2px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .header-inner { padding: 0 1rem; }
    .header-title { display: none; }
    main { padding: 1rem; }
    .calc-hero { padding: 1.5rem; gap: 1.5rem; }
    .calc-title { font-size: 26px; }
    .time-spin { font-size: 24px; width: 44px; }
    .time-sep { font-size: 22px; }
    .pass-table tbody td { padding: 10px 12px; }
    .bar-col { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">RPT<span>.</span>HYBRID</div>
    <div class="header-title">Calculateur Marathon</div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('calc')">Mon Objectif</button>
      <button class="tab-btn" onclick="switchTab('ref')">Grille Référence</button>
    </div>
  </div>
</header>

<main>

  <!-- ====== ONGLET CALCULATEUR ====== -->
  <div id="view-calc" class="view active">

    <div class="calc-hero">
      <div class="calc-label-group">
        <div class="calc-label">Outil de préparation</div>
        <div class="calc-title">Temps de<br><span>Passage</span></div>
      </div>

      <div class="input-group">
        <div>
          <div class="calc-label" style="margin-bottom:10px;">Temps objectif</div>
          <div class="time-inputs">
            <div class="time-col">
              <input class="time-spin" type="number" id="inp-h" value="3" min="2" max="6">
              <span class="time-unit-label">h</span>
            </div>
            <div class="time-sep">:</div>
            <div class="time-col">
              <input class="time-spin" type="number" id="inp-m" value="30" min="0" max="59">
              <span class="time-unit-label">min</span>
            </div>
            <div class="time-sep">:</div>
            <div class="time-col">
              <input class="time-spin" type="number" id="inp-s" value="0" min="0" max="59">
              <span class="time-unit-label">sec</span>
            </div>
          </div>
        </div>

        <div class="pace-display">
          <div class="pace-value" id="pace-display">4'58"/km</div>
          <div class="pace-sub">Allure cible</div>
        </div>
      </div>
    </div>

    <div class="pass-table">
      <table>
        <thead>
          <tr>
            <th>Point km</th>
            <th>Temps de passage</th>
            <th>Allure</th>
            <th>Split 5km</th>
            <th class="bar-col">Progression</th>
          </tr>
        </thead>
        <tbody id="calc-tbody"></tbody>
      </table>
    </div>

  </div>

  <!-- ====== ONGLET GRILLE RÉFÉRENCE ====== -->
  <div id="view-ref" class="view">

    <div class="ref-controls">
      <div class="ref-controls-label">Plage d'objectifs</div>
      <div class="range-group">
        <select id="ref-start" onchange="renderGrid()"></select>
        <span class="range-sep">→</span>
        <select id="ref-end" onchange="renderGrid()"></select>
      </div>
      <div class="ref-hint">Affiche les temps de passage pour chaque objectif</div>
    </div>

    <div class="grid-wrapper">
      <table class="grid-table" id="grid-table"></table>
    </div>

  </div>

</main>

<footer>
  Outil développé par <strong>RPT.HYBRID</strong> — rpt-hybrid.com
</footer>

<script>
const MARATHON = 42.195;
const KM_POINTS = [5, 10, 15, 20, 25, 30, 35, 40, 42.195];

function toSec(h, m, s) { return h*3600 + m*60 + s; }

function fmtTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function fmtPace(secPerKm) {
  const m = Math.floor(secPerKm / 60);
  const s = Math.floor(secPerKm % 60);
  return `${m}'${String(s).padStart(2,'0')}"`;
}

function fmtTimeShort(totalSec) {
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  return h > 0 ? `${h}h${String(m).padStart(2,'0')}` : `${m}min`;
}

// All objectives 2h30 → 5h00 every 5 min
const ALL_OBJ = [];
for (let s = toSec(2,30,0); s <= toSec(5,0,0); s += 300) ALL_OBJ.push(s);

// ===== CALCULATEUR =====
function getTargetSec() {
  const h = parseInt(document.getElementById('inp-h').value) || 0;
  const m = parseInt(document.getElementById('inp-m').value) || 0;
  const s = parseInt(document.getElementById('inp-s').value) || 0;
  return toSec(h, m, s);
}

function renderCalc() {
  const target = getTargetSec();
  if (target < 1800) return;

  const pacePerKm = target / MARATHON;
  const pm = Math.floor(pacePerKm / 60);
  const ps = Math.floor(pacePerKm % 60);
  document.getElementById('pace-display').textContent = `${pm}'${String(ps).padStart(2,'0')}"/km`;

  const tbody = document.getElementById('calc-tbody');
  tbody.innerHTML = '';
  let prevSplit = 0;

  KM_POINTS.forEach((km, i) => {
    const isFinish = km === 42.195;
    const passage = target * (km / MARATHON);
    const splitDist = i === 0 ? 5 : km - KM_POINTS[i-1];
    const splitTime = passage - prevSplit;
    const pct = (km / MARATHON) * 100;
    prevSplit = passage;

    const tr = document.createElement('tr');
    if (isFinish) tr.classList.add('finish-row');

    tr.innerHTML = `
      <td><span class="km-badge">${isFinish ? '42.195 km' : km + ' km'}</span></td>
      <td class="time-cell">${fmtTime(passage)}</td>
      <td class="pace-cell">${fmtPace(pacePerKm)}/km</td>
      <td class="split-cell">${fmtTime(splitTime)}</td>
      <td class="bar-col">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:${pct.toFixed(1)}%"></div>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

['inp-h','inp-m','inp-s'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderCalc);
});

// Clamp minutes/seconds
document.getElementById('inp-m').addEventListener('blur', function() {
  if (parseInt(this.value) > 59) this.value = 59;
  if (parseInt(this.value) < 0) this.value = 0;
  renderCalc();
});
document.getElementById('inp-s').addEventListener('blur', function() {
  if (parseInt(this.value) > 59) this.value = 59;
  if (parseInt(this.value) < 0) this.value = 0;
  renderCalc();
});

// ===== GRILLE RÉFÉRENCE =====
function populateSelects() {
  const startSel = document.getElementById('ref-start');
  const endSel = document.getElementById('ref-end');
  ALL_OBJ.forEach(s => {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
    const label = `${h}h${String(m).padStart(2,'0')}`;
    startSel.add(new Option(label, s));
    endSel.add(new Option(label, s));
  });
  startSel.value = toSec(3,0,0);
  endSel.value = toSec(4,0,0);
}

function renderGrid() {
  const startSec = parseInt(document.getElementById('ref-start').value);
  const endSec   = parseInt(document.getElementById('ref-end').value);
  const objectives = ALL_OBJ.filter(s => s >= startSec && s <= endSec);

  const table = document.getElementById('grid-table');
  table.innerHTML = '';

  // Header row 1: objectifs
  const thead = document.createElement('thead');
  const tr1 = document.createElement('tr');
  const th0 = document.createElement('th');
  th0.className = 'km-head';
  th0.innerHTML = 'KM';
  tr1.appendChild(th0);

  objectives.forEach(objSec => {
    const h = Math.floor(objSec/3600);
    const m = Math.floor((objSec%3600)/60);
    const pacePerKm = objSec / MARATHON;
    const pm = Math.floor(pacePerKm/60);
    const ps = Math.floor(pacePerKm%60);
    const th = document.createElement('th');
    th.innerHTML = `<span class="obj-time">${h}h${String(m).padStart(2,'0')}</span><span class="obj-pace">${pm}'${String(ps).padStart(2,'0')}"/km</span>`;
    tr1.appendChild(th);
  });
  thead.appendChild(tr1);
  table.appendChild(thead);

  // Body
  const tbody = document.createElement('tbody');
  KM_POINTS.forEach(km => {
    const isFinish = km === 42.195;
    const tr = document.createElement('tr');
    if (isFinish) tr.classList.add('finish-row');

    const tdKm = document.createElement('td');
    tdKm.className = 'km-cell';
    tdKm.textContent = isFinish ? '42.2' : km;
    tr.appendChild(tdKm);

    objectives.forEach(objSec => {
      const passage = objSec * (km / MARATHON);
      const td = document.createElement('td');
      td.textContent = fmtTime(passage);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
}

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  event.target.classList.add('active');
}

// INIT
renderCalc();
populateSelects();
renderGrid();
</script>
</body>
</html>
